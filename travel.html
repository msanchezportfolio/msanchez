    const globeDiv = document.getElementById('globeViz');
    
    const world = Globe()
        (globeDiv)
        .width(globeDiv.offsetWidth)
        .height(500)
        .globeImageUrl('images/earth.jpg') 
        .pointsData(myTravels)
        .pointColor(() => 'red')
        .pointRadius(0.4)
        .pointAltitude(0.005)
        /* This is the brute-force fix. It forces white text on a dark background bubble. */
        .pointLabel(d => `
            <div style="
                color: #ffffff !important; 
                background: rgba(0, 0, 0, 0.85); 
                padding: 6px 12px; 
                border-radius: 4px; 
                border: 1px solid rgba(255, 255, 255, 0.3); 
                font-weight: bold;
                font-family: sans-serif;
                white-space: nowrap;
            ">
                ${d.name}
            </div>
        `)
        .pointResolution(32);
// ... rest of your globe settings ...
    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 1;

    // --- ADD THIS LINE HERE ---
    world.pointOfView({ lat: 20, lng: -40, alt: 1.9 });

    // --- AUTO-PAUSE ON HOVER ---
    globeDiv.addEventListener('mouseenter', () => {
        world.controls().autoRotate = true;
        world.controls().autoRotateSpeed = 0.05;
    });

    globeDiv.addEventListener('mouseleave', () => {
        world.controls().autoRotate = true;
        world.controls().autoRotateSpeed = 1;
    });
