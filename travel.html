	<body class="is-preload">

				<header id="header">

						</ul>
					</nav>

				<div id="main">
						<section class="post">
							<header class="major">
								<h1>My Travels</h1>
								<p>An interactive look at my travels.<br />
								From UIUC to Japan, Australia, and beyond.</p>
							</header>
							
							<div id="globeViz"></div>
							
							<p style="text-align: center; margin-top: 1rem;">
								<em>Click and drag to rotate the globe manually.</em>
							</p>
						</section>
					</div>

				<footer id="footer">
						<section class="split contact">
							<section>
								<h3>Email</h3>
								<p><a>sanchezmatthew975@gmail.com</a></p>

							<section>
								<h3>Social</h3>
								<ul class="icons alt">
									<li><a href="https://www.linkedin.com/in/matthew-sanchez-/" class="icon brands alt fa-linkedin"><span class="label">LinkedIn</span></a></li>
								</ul>
							</section>
						</section>
					</footer>

			</div>

		<script src="assets/js/jquery.min.js"></script>
			<script src="assets/js/jquery.scrollex.min.js"></script>
			<script src="assets/js/jquery.scrolly.min.js"></script>
			<script src="assets/js/browser.min.js"></script>
			<script src="assets/js/breakpoints.min.js"></script>
			<script src="assets/js/util.js"></script>
			<script src="assets/js/main.js"></script>

			<script>
				const myTravels = [
					{ name: 'Tokyo & Kyoto, Japan', lat: 35.6762, lng: 139.6503 },
					{ name: 'Sydney & Perth, Australia', lat: -33.8688, lng: 151.2093 },
					{ name: 'San Francisco, CA', lat: 37.7749, lng: -122.4194 },
					{ name: 'New York City, NY', lat: 40.7128, lng: -74.0060 },
					{ name: 'Champaign, IL', lat: 40.1164, lng: -88.2434 }
				];

				const world = Globe()
					(document.getElementById('globeViz'))
					.globeImageUrl('images/earth.png') // Make sure this file exists in your images folder!
					.pointsData(myTravels)
					.pointLabel('name')
					.pointRadius(0.6)
					.pointColor(() => '#ff0000');

				// Make it spin!
				world.controls().autoRotate = true;
				world.controls().autoRotateSpeed = 0.7;
			</script>

	</body>
